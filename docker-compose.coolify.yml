services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api-journal/Dockerfile
      target: builder
    command: >
      sh -c "cd /app/packages/db-schema &&
             npx typeorm-ts-node-commonjs migration:run -d src/data-source.ts"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api-journal:
    build:
      context: .
      dockerfile: apps/api-journal/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REPORT_URL: http://api-report:3002
      JOURNAL_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  api-report:
    build:
      context: .
      dockerfile: apps/api-report/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DART_API_KEY: ${DART_API_KEY}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      REPORT_PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_JOURNAL_URL: ${NEXT_PUBLIC_JOURNAL_URL}
        NEXT_PUBLIC_REPORT_URL: ${NEXT_PUBLIC_REPORT_URL}
    restart: always
    environment:
      PORT: 3005
    depends_on:
      - api-journal
      - api-report

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/nginx.coolify.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api-journal
      - api-report
    labels:
      - traefik.enable=true
      - traefik.http.routers.stock-pile.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.stock-pile.entrypoints=https
      - traefik.http.routers.stock-pile.tls=true
      - traefik.http.routers.stock-pile.tls.certresolver=letsencrypt
      - traefik.http.services.stock-pile.loadbalancer.server.port=80
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true

volumes:
  postgres_data:
  redis_data:
