version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stock-pile-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockpile}
      POSTGRES_USER: ${POSTGRES_USER:-stockpile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpile}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-stockpile}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stock-pile-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: stock-pile-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    # 로컬 GPU 없으면 CPU 모드로 동작
    # GPU 있으면: deploy.resources.reservations.devices 추가

volumes:
  postgres_data:
  redis_data:
  ollama_data:
