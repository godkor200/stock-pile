<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.4">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Background chart fill -->
  <polygon
    points="620,420 680,370 740,390 800,310 860,330 920,260 980,280 1040,210 1100,230 1150,190 1150,520 620,520"
    fill="url(#chartGrad)"
    opacity="0.6"
  />

  <!-- Chart line -->
  <polyline
    points="620,420 680,370 740,390 800,310 860,330 920,260 980,280 1040,210 1100,230 1150,190"
    fill="none"
    stroke="#10b981"
    stroke-width="2.5"
    stroke-linejoin="round"
    filter="url(#glow)"
    opacity="0.85"
  />

  <!-- Chart dots -->
  <circle cx="1040" cy="210" r="5" fill="#10b981" filter="url(#glow)"/>
  <circle cx="1150" cy="190" r="5" fill="#10b981" filter="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentLine)"/>

  <!-- Left content area -->

  <!-- Tag: 사이드 프로젝트 -->
  <rect x="60" y="80" width="170" height="34" rx="17" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="103" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="500">사이드 프로젝트</text>

  <!-- Main title -->
  <text x="60" y="200" font-family="'Noto Sans KR', sans-serif" font-size="54" fill="#f1f5f9" font-weight="700" letter-spacing="-1">개인 투자 어시스턴트를</text>
  <text x="60" y="268" font-family="'Noto Sans KR', sans-serif" font-size="54" fill="#f1f5f9" font-weight="700" letter-spacing="-1">직접 만들어 봤다</text>

  <!-- Subtitle -->
  <text x="60" y="330" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="#64748b" font-weight="400">매매 일지 · AI 분석 · 백테스트를 하나로</text>

  <!-- Divider -->
  <rect x="60" y="360" width="80" height="3" rx="2" fill="url(#accentLine)"/>

  <!-- Tech stack badges -->
  <!-- NestJS -->
  <rect x="60" y="390" width="90" height="32" rx="8" fill="#1a1a2e" stroke="#e11d48" stroke-width="1"/>
  <text x="105" y="411" font-family="monospace" font-size="13" fill="#e11d48" text-anchor="middle" font-weight="600">NestJS</text>

  <!-- Next.js -->
  <rect x="162" y="390" width="80" height="32" rx="8" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="1"/>
  <text x="202" y="411" font-family="monospace" font-size="13" fill="#e2e8f0" text-anchor="middle" font-weight="600">Next.js</text>

  <!-- FastAPI -->
  <rect x="254" y="390" width="82" height="32" rx="8" fill="#1a1a2e" stroke="#059669" stroke-width="1"/>
  <text x="295" y="411" font-family="monospace" font-size="13" fill="#059669" text-anchor="middle" font-weight="600">FastAPI</text>

  <!-- Claude -->
  <rect x="60" y="434" width="76" height="32" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="98" y="455" font-family="monospace" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="600">Claude</text>

  <!-- pgvector -->
  <rect x="148" y="434" width="92" height="32" rx="8" fill="#1a1a2e" stroke="#38bdf8" stroke-width="1"/>
  <text x="194" y="455" font-family="monospace" font-size="13" fill="#38bdf8" text-anchor="middle" font-weight="600">pgvector</text>

  <!-- Groq -->
  <rect x="252" y="434" width="60" height="32" rx="8" fill="#1a1a2e" stroke="#fb923c" stroke-width="1"/>
  <text x="282" y="455" font-family="monospace" font-size="13" fill="#fb923c" text-anchor="middle" font-weight="600">Groq</text>

  <!-- Chat bubble mockup -->
  <rect x="620" y="80" width="420" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="648" y="114" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#94a3b8">사용자</text>
  <text x="648" y="145" font-family="'Noto Sans KR', sans-serif" font-size="17" fill="#f1f5f9" font-weight="500">삼성전자 10주 매수</text>

  <!-- Arrow down -->
  <line x1="830" y1="180" x2="830" y2="210" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="824,206 830,218 836,206" fill="#334155"/>

  <rect x="620" y="218" width="420" height="115" rx="12" fill="#0f2a1e" stroke="#10b981" stroke-width="1.5"/>
  <text x="648" y="252" font-family="'Noto Sans KR', sans-serif" font-size="14" fill="#34d399">AI 파싱 완료</text>
  <text x="648" y="280" font-family="'Noto Sans KR', sans-serif" font-size="16" fill="#f1f5f9">종목: 삼성전자 (005930)</text>
  <text x="648" y="305" font-family="'Noto Sans KR', sans-serif" font-size="16" fill="#f1f5f9">매수 · 10주 · 시장가</text>
  <!-- Confirm button hint -->
  <rect x="648" y="318" width="68" height="24" rx="6" fill="#10b981" opacity="0.85"/>
  <text x="682" y="334" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">확인</text>

  <!-- Bottom URL -->
  <text x="60" y="570" font-family="monospace" font-size="17" fill="#3b82f6" opacity="0.9">byeongguk.cloud/chat</text>

  <!-- Bottom right: commit count badge -->
  <rect x="960" y="555" width="180" height="40" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1050" y="581" font-family="'Noto Sans KR', sans-serif" font-size="15" fill="#64748b" text-anchor="middle">56 commits · 2주</text>

</svg>
