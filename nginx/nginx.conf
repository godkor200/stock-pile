events {
  worker_connections 1024;
}

http {
  upstream web        { server web:3005; }
  upstream journal    { server api-journal:3001; }
  upstream report     { server api-report:3002; }

  # HTTP → HTTPS 리다이렉트
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # api-journal (/api/journal/xxx → /api/xxx, globalPrefix 유지)
    location /api/journal/ {
      rewrite ^/api/journal/(.*)$ /api/$1 break;
      proxy_pass http://journal;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # api-report (/api/report/xxx → /api/xxx)
    location /api/report/ {
      rewrite ^/api/report/(.*)$ /api/$1 break;
      proxy_pass http://report;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Next.js
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
